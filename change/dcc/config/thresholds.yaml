# Clinical decision thresholds for bone level change.
# Units: pixels (assuming 10 lp/mm, 0.1mm/px resolution)

# Minimum clinically significant bone loss (varies by guideline):
# - Tonetti et al. 2018 (EFP): ≥2mm attachment loss → 20px
# - Papapanou et al. 2018 (AAP): ≥2mm radiographic bone loss → 20px
# - Conservative case-detection: 1mm → 10px (half the standard)
bone_level_change:
  tau_clinically_significant_px: 20.0    # 2mm: EFP/AAP staging threshold
  tau_conservative_px: 10.0             # 1mm: stringent early detection
  tau_artifact_px: 5.0                  # 0.5mm: acquisition artifact upper bound

# Coverage thresholds:
coverage:
  min_coverage_fraction: 0.65   # below this → uncertain / recapture
  high_coverage_fraction: 0.80  # above this → high confidence

# Conformal miscoverage:
conformal:
  alpha_standard: 0.1   # 90% coverage
  alpha_strict: 0.05    # 95% coverage
