# Acquisition perturbation magnitudes anchored to clinical literature.
# Pixel values assume 10 lp/mm resolution (0.1mm/px).

# Sensor repositioning noise (between radiographic acquisitions):
# - Aasen et al. 2021: ~0.3mm RMS CEJ detection → 3px
# - Slot et al. 2018: angulation bias ≤30° → 11.4% bone-level error → ~1.14mm → 11.4px
# - Standard: 3px noise_std, 10px worst-case
acquisition_noise:
  noise_std_px: 3.0            # ~0.3mm, 1-sigma Gaussian
  worst_case_px: 10.0          # 99th percentile repositioning error
  angulation_bias_max_deg: 30.0
  angulation_bone_level_error_pct: 11.4  # from Slot et al. 2018

# Rigid transform bounds for adversarial confounder grid search:
rigid_search:
  dx_range_px: [-20, -10, -5, 0, 5, 10, 20]
  dy_range_px: [-20, -10, -5, 0, 5, 10, 20]
  scale_range: [0.95, 1.0, 1.05]
